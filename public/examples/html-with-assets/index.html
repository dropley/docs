<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HTML with Assets | Dropley</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/water.css@2/out/water.css">
  <style>
    body { max-width: 640px; margin: 40px auto; padding: 0 20px; }
    .badge { display: inline-block; padding: 4px 12px; border-radius: 12px; background: #F5A623; color: #fff; font-size: 0.8rem; }
  </style>
</head>
<body>
  <h1>HTML with External Assets</h1>
  <p class="badge">Dropley Example</p>
  <p>This page loads CSS from a CDN and uses inline styles. Perfect for single-file Dropley projects.</p>
  <h2>How it works</h2>
  <ul>
    <li>Water.css provides clean base styles via CDN</li>
    <li>Inline CSS adds custom styling</li>
    <li>No JavaScript needed for this example</li>
  </ul>
  <script>
    console.log("Published via Dropley!");
  </script>
</body>
</html>
